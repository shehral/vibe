<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Back card -->
  <rect x="14" y="6" width="22" height="16" rx="2" stroke="#4a6fa5" stroke-width="0.8" stroke-opacity="0.3" fill="#4a6fa5" fill-opacity="0.05" transform="rotate(3 25 14)"/>
  <!-- Middle card -->
  <rect x="12" y="12" width="22" height="16" rx="2" stroke="#4a6fa5" stroke-width="1" stroke-opacity="0.5" fill="#4a6fa5" fill-opacity="0.08" transform="rotate(-2 23 20)"/>
  <!-- Front card / chip -->
  <rect x="10" y="18" width="24" height="18" rx="2.5" stroke="#4a6fa5" stroke-width="1.5" fill="#4a6fa5" fill-opacity="0.12"/>
  <!-- Chip circuit lines -->
  <line x1="16" y1="24" x2="22" y2="24" stroke="#4a6fa5" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="16" y1="27" x2="20" y2="27" stroke="#4a6fa5" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="16" y1="30" x2="24" y2="30" stroke="#4a6fa5" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Chip contact pads -->
  <rect x="26" y="22" width="4" height="3" rx="0.5" fill="#4a6fa5" fill-opacity="0.25"/>
  <rect x="26" y="28" width="4" height="3" rx="0.5" fill="#4a6fa5" fill-opacity="0.25"/>
  <!-- Stack indicator dots -->
  <circle cx="28" cy="42" r="1.5" fill="#4a6fa5" fill-opacity="0.3"/>
  <circle cx="24" cy="42" r="1.5" fill="#4a6fa5" fill-opacity="0.2"/>
  <circle cx="20" cy="42" r="1.5" fill="#4a6fa5" fill-opacity="0.15"/>
</svg>
