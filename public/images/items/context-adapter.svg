<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Plug body -->
  <rect x="14" y="16" width="20" height="12" rx="3" stroke="#6b9e78" stroke-width="1.5" fill="#6b9e78" fill-opacity="0.12"/>
  <!-- Connector pins -->
  <line x1="19" y1="28" x2="19" y2="34" stroke="#6b9e78" stroke-width="1.2"/>
  <line x1="24" y1="28" x2="24" y2="36" stroke="#6b9e78" stroke-width="1.2"/>
  <line x1="29" y1="28" x2="29" y2="34" stroke="#6b9e78" stroke-width="1.2"/>
  <!-- Cable line going up -->
  <line x1="24" y1="16" x2="24" y2="8" stroke="#6b9e78" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Connection indicators -->
  <circle cx="19" cy="22" r="1.5" fill="#6b9e78" fill-opacity="0.4"/>
  <circle cx="24" cy="22" r="1.5" fill="#6b9e78" fill-opacity="0.4"/>
  <circle cx="29" cy="22" r="1.5" fill="#6b9e78" fill-opacity="0.4"/>
  <!-- Signal arc at top -->
  <path d="M 20 10 Q 24 6, 28 10" stroke="#6b9e78" stroke-width="0.6" stroke-opacity="0.3" fill="none"/>
</svg>
