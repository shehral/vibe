<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Cube / processor chip - top face -->
  <polygon points="24,8 40,16 40,32 24,40 8,32 8,16" stroke="#e8e0d4" stroke-width="1.5" fill="#e8e0d4" fill-opacity="0.08"/>
  <!-- Cube center line -->
  <line x1="24" y1="8" x2="24" y2="24" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="8" y1="16" x2="24" y2="24" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="40" y1="16" x2="24" y2="24" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Bottom half -->
  <line x1="24" y1="24" x2="24" y2="40" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="24" y1="24" x2="8" y2="32" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="24" y1="24" x2="40" y2="32" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Processor pins -->
  <line x1="14" y1="12" x2="10" y2="8" stroke="#e8e0d4" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="34" y1="12" x2="38" y2="8" stroke="#e8e0d4" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="4" y1="24" x2="8" y2="24" stroke="#e8e0d4" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="40" y1="24" x2="44" y2="24" stroke="#e8e0d4" stroke-width="0.7" stroke-opacity="0.3"/>
  <!-- Center core glow -->
  <circle cx="24" cy="24" r="3" fill="#e8e0d4" fill-opacity="0.2"/>
</svg>
