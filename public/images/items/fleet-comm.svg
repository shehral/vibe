<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Antenna mast -->
  <line x1="24" y1="40" x2="24" y2="16" stroke="#6b9e78" stroke-width="1.5"/>
  <!-- Antenna base -->
  <line x1="18" y1="40" x2="30" y2="40" stroke="#6b9e78" stroke-width="1.2"/>
  <!-- Antenna crossbar -->
  <line x1="16" y1="20" x2="32" y2="20" stroke="#6b9e78" stroke-width="1.2"/>
  <!-- Antenna tip -->
  <circle cx="24" cy="14" r="2" fill="#6b9e78" fill-opacity="0.4"/>
  <!-- Radio waves -->
  <path d="M 28 12 Q 32 8, 36 12" stroke="#6b9e78" stroke-width="0.8" stroke-opacity="0.5" fill="none"/>
  <path d="M 30 10 Q 36 4, 42 10" stroke="#6b9e78" stroke-width="0.6" stroke-opacity="0.3" fill="none"/>
  <path d="M 20 12 Q 16 8, 12 12" stroke="#6b9e78" stroke-width="0.8" stroke-opacity="0.5" fill="none"/>
  <path d="M 18 10 Q 12 4, 6 10" stroke="#6b9e78" stroke-width="0.6" stroke-opacity="0.3" fill="none"/>
  <!-- Signal dots -->
  <circle cx="16" cy="20" r="1.5" fill="#6b9e78" fill-opacity="0.35"/>
  <circle cx="32" cy="20" r="1.5" fill="#6b9e78" fill-opacity="0.35"/>
</svg>
