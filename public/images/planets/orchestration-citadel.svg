<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Diamond / crystal structure -->
  <polygon points="40,6 60,30 40,54 20,30" stroke="#e8e0d4" stroke-width="1.5" fill="#e8e0d4" fill-opacity="0.1"/>
  <!-- Inner diamond facets -->
  <line x1="40" y1="6" x2="40" y2="54" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="20" y1="30" x2="60" y2="30" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Facet lines -->
  <line x1="40" y1="6" x2="20" y2="30" stroke="#e8e0d4" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="40" y1="6" x2="60" y2="30" stroke="#e8e0d4" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Crystal base extension -->
  <line x1="40" y1="54" x2="40" y2="66" stroke="#e8e0d4" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="34" y1="62" x2="46" y2="62" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.2"/>
  <!-- Glow at center -->
  <circle cx="40" cy="30" r="5" fill="#e8e0d4" fill-opacity="0.15"/>
  <circle cx="40" cy="30" r="2" fill="#e8e0d4" fill-opacity="0.3"/>
  <!-- Floating shards -->
  <polygon points="10,16 14,12 18,18 12,20" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.25" fill="none"/>
  <polygon points="64,18 68,14 70,20 66,22" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.25" fill="none"/>
</svg>
