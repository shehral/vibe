<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Main planet -->
  <circle cx="36" cy="40" r="20" stroke="#6b9e78" stroke-width="1.5" fill="#6b9e78" fill-opacity="0.12"/>
  <!-- Planet surface line -->
  <path d="M 20 34 Q 36 30, 52 36" stroke="#6b9e78" stroke-width="0.6" stroke-opacity="0.3" fill="none"/>
  <path d="M 22 46 Q 36 50, 50 44" stroke="#6b9e78" stroke-width="0.5" stroke-opacity="0.2" fill="none"/>
  <!-- Moon 1 -->
  <circle cx="64" cy="20" r="5" stroke="#6b9e78" stroke-width="1" fill="#6b9e78" fill-opacity="0.2"/>
  <!-- Moon 2 -->
  <circle cx="68" cy="44" r="4" stroke="#6b9e78" stroke-width="0.8" fill="#6b9e78" fill-opacity="0.15"/>
  <!-- Moon 3 -->
  <circle cx="58" cy="64" r="3.5" stroke="#6b9e78" stroke-width="0.8" fill="#6b9e78" fill-opacity="0.12"/>
  <!-- Orbital paths (subtle) -->
  <ellipse cx="36" cy="40" rx="32" ry="22" stroke="#6b9e78" stroke-width="0.4" stroke-opacity="0.15" transform="rotate(-20 36 40)"/>
  <ellipse cx="36" cy="40" rx="36" ry="26" stroke="#6b9e78" stroke-width="0.3" stroke-opacity="0.1" transform="rotate(10 36 40)"/>
</svg>
