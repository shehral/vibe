<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Left half of head (solid) -->
  <path d="M 40 18 A 16 16 0 0 0 40 50" stroke="#e8e0d4" stroke-width="1.5" fill="#e8e0d4" fill-opacity="0.1"/>
  <!-- Right half of head (mirrored, dashed) -->
  <path d="M 40 18 A 16 16 0 0 1 40 50" stroke="#e8e0d4" stroke-width="1.5" stroke-dasharray="2 2" fill="#e8e0d4" fill-opacity="0.05"/>
  <!-- Center mirror line -->
  <line x1="40" y1="14" x2="40" y2="54" stroke="#e8e0d4" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Left eye -->
  <circle cx="34" cy="32" r="2" fill="#e8e0d4" fill-opacity="0.5"/>
  <!-- Right eye (mirror, slightly faded) -->
  <circle cx="46" cy="32" r="2" fill="#e8e0d4" fill-opacity="0.3"/>
  <!-- Left mouth -->
  <line x1="35" y1="39" x2="39" y2="39" stroke="#e8e0d4" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Right mouth (mirror) -->
  <line x1="41" y1="39" x2="45" y2="39" stroke="#e8e0d4" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- Reflection sparkle effects -->
  <line x1="58" y1="22" x2="62" y2="18" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="60" y1="22" x2="60" y2="18" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="18" y1="22" x2="14" y2="18" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="16" y1="22" x2="16" y2="18" stroke="#e8e0d4" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Neck -->
  <line x1="40" y1="50" x2="40" y2="62" stroke="#e8e0d4" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="34" y1="58" x2="46" y2="58" stroke="#e8e0d4" stroke-width="0.8" stroke-opacity="0.2"/>
</svg>
