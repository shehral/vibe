<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Head circle -->
  <circle cx="40" cy="32" r="16" stroke="#4a6fa5" stroke-width="1.5" fill="#4a6fa5" fill-opacity="0.1"/>
  <!-- Face features - eyes -->
  <circle cx="34" cy="30" r="2" fill="#4a6fa5" fill-opacity="0.5"/>
  <circle cx="46" cy="30" r="2" fill="#4a6fa5" fill-opacity="0.5"/>
  <!-- Mouth line -->
  <path d="M 35 37 Q 40 40, 45 37" stroke="#4a6fa5" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <!-- Signal waves emanating -->
  <path d="M 58 24 Q 62 28, 58 32" stroke="#4a6fa5" stroke-width="1" stroke-opacity="0.5" fill="none"/>
  <path d="M 62 20 Q 68 28, 62 36" stroke="#4a6fa5" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
  <path d="M 66 16 Q 74 28, 66 40" stroke="#4a6fa5" stroke-width="0.6" stroke-opacity="0.2" fill="none"/>
  <!-- Signal waves left -->
  <path d="M 22 24 Q 18 28, 22 32" stroke="#4a6fa5" stroke-width="1" stroke-opacity="0.5" fill="none"/>
  <path d="M 18 20 Q 12 28, 18 36" stroke="#4a6fa5" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
  <!-- Neck / body hint -->
  <line x1="40" y1="48" x2="40" y2="60" stroke="#4a6fa5" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="32" y1="56" x2="48" y2="56" stroke="#4a6fa5" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- Digital halo -->
  <circle cx="40" cy="32" r="20" stroke="#4a6fa5" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="3 3"/>
</svg>
