<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Head shape -->
  <circle cx="40" cy="34" r="16" stroke="#6b9e78" stroke-width="1.5" fill="#6b9e78" fill-opacity="0.1"/>
  <!-- Large eye shape -->
  <ellipse cx="40" cy="32" rx="12" ry="7" stroke="#6b9e78" stroke-width="1.2" fill="#6b9e78" fill-opacity="0.08"/>
  <!-- Pupil -->
  <circle cx="40" cy="32" r="4" stroke="#6b9e78" stroke-width="1" fill="#6b9e78" fill-opacity="0.3"/>
  <circle cx="40" cy="32" r="1.5" fill="#6b9e78" fill-opacity="0.6"/>
  <!-- Scan lines radiating from eye -->
  <line x1="54" y1="26" x2="68" y2="18" stroke="#6b9e78" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="54" y1="32" x2="70" y2="32" stroke="#6b9e78" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="54" y1="38" x2="68" y2="46" stroke="#6b9e78" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="26" y1="26" x2="12" y2="18" stroke="#6b9e78" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="26" y1="32" x2="10" y2="32" stroke="#6b9e78" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="26" y1="38" x2="12" y2="46" stroke="#6b9e78" stroke-width="0.7" stroke-opacity="0.3"/>
  <!-- Scan endpoints -->
  <circle cx="68" cy="18" r="1.2" fill="#6b9e78" fill-opacity="0.25"/>
  <circle cx="70" cy="32" r="1.2" fill="#6b9e78" fill-opacity="0.3"/>
  <circle cx="68" cy="46" r="1.2" fill="#6b9e78" fill-opacity="0.25"/>
  <!-- Neck -->
  <line x1="40" y1="50" x2="40" y2="62" stroke="#6b9e78" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="34" y1="58" x2="46" y2="58" stroke="#6b9e78" stroke-width="0.8" stroke-opacity="0.2"/>
</svg>
